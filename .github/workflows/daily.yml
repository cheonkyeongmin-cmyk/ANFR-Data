name: ANFR Daily Monitor

on:
  schedule:
    - cron: "30 21 * * *"   # 21:30 UTC = 약 07:00 KST (지연 여유 포함)
  workflow_dispatch:        # 수동 실행 버튼 (테스트용)

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ANFR 실행
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python anfr_monitor.py

      - name: 결과 업로드
        uses: actions/upload-artifact@v4
        with:
          name: anfr-report
          path: report.html

      - name: 변경 데이터 저장
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add previous_data.csv report.html
          git commit -m "Update ANFR daily data" || echo "No changes to commit"
          git push
